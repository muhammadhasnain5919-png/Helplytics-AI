<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpHub AI – Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          135deg,
          #d4ede4 0%,
          #f5f0e8 40%,
          #fde8d0 100%
        );
        min-height: 100vh;
        padding-top: 56px;
      }

      nav.main-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: 56px;
        background: linear-gradient(
          to right,
          #e8e4d8 0%,
          #f0ede4 25%,
          #f8f6f0 55%,
          #fdfcfa 80%,
          #ffffff 100%
        );
        border-bottom: 1px solid #e8e8e4;
        display: flex;
        align-items: center;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: #2d8b78;
        color: #fff;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-text {
        font-size: 14px;
        font-weight: 600;
        color: #1a1a18;
      }

      .nav-link-item {
        font-size: 13.5px;
        color: #555550;
        text-decoration: none;
        padding: 5px 13px;
        border-radius: 20px;
      }

      .nav-link-item.active {
        color: #1a1a18;
        font-weight: 500;
        background: #f0ede8;
        border: 1px solid #d0cdc5;
      }

      .hero-banner {
        background: #1e2820;
        border-radius: 16px;
        padding: 48px 48px 44px;
        margin-top: 40px;
      }

      .hero-banner .eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 16px;
      }

      .hero-banner h1 {
        font-family: "DM Serif Display", serif;
        font-size: 52px;
        font-weight: 400;
        color: #fff;
        line-height: 1.08;
        margin-bottom: 12px;
      }

      .hero-banner .sub {
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.5);
      }

      .panel {
        background: #fff;
        border-radius: 16px;
        padding: 36px 32px;
        height: 100%;
      }

      .panel .eyebrow {
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #2d8b78;
        margin-bottom: 10px;
      }

      .panel h2 {
        font-family: "DM Serif Display", serif;
        font-size: 34px;
        font-weight: 400;
        color: #1a1a18;
        margin-bottom: 28px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid #f0f0ec;
        font-size: 13.5px;
        color: #1a1a18;
      }

      .stat-row .val {
        font-weight: 600;
        color: #1a1a18;
      }

      .skill-label {
        font-size: 13px;
        font-weight: 600;
        color: #1a1a18;
        margin: 20px 0 10px;
      }

      .tag {
        font-size: 12px;
        font-weight: 500;
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid #d0ece6;
        color: #2d8b78;
        background: #f0faf7;
        display: inline-block;
      }

      .panel label {
        font-size: 13px;
        font-weight: 500;
        color: #1a1a18;
        margin-bottom: 6px;
        display: block;
      }

      .panel input {
        width: 100%;
        border: 1px solid #e0e0da;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13.5px;
        font-family: "Inter", sans-serif;
        color: #1a1a18;
        background: #fff;
        outline: none;
        margin-bottom: 16px;
      }

      .btn-save {
        width: 100%;
        background: #2d8b78;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 15px;
        font-size: 15px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        margin-top: 4px;
      }

      .name-loc-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @media (max-width: 576px) {
        .hero-banner {
          padding: 32px 24px;
        }
        .hero-banner h1 {
          font-size: 34px;
        }
        .panel {
          padding: 24px 20px;
        }
        .name-loc-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="main-nav">
      <div class="container" style="max-width: 960px">
        <div class="d-flex align-items-center justify-content-between w-100">
          <div class="d-flex align-items-center gap-3">
            <div class="logo-icon">H</div>
            <span class="logo-text">HelpHub AI</span>
          </div>
          <div class="d-flex align-items-center gap-1">
            <a href="#" class="nav-link-item">Dashboard</a>
            <a href="#" class="nav-link-item">Onboarding</a>
            <a href="#" class="nav-link-item active">Profile</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="container py-4" style="max-width: 960px">
      <div class="hero-banner mb-4">
        <p class="eyebrow">Profile</p>
        <h1>Ayesha Khan</h1>
        <p class="sub">Both • Karachi</p>
      </div>

      <div class="row g-4 align-items-stretch">
        <div class="col-12 col-md-7">
          <div class="panel">
            <p class="eyebrow">Public Profile</p>
            <h2>Skills and reputation</h2>

            <div class="stat-row">
              <span>Trust score</span>
              <span class="val">100%</span>
            </div>
            <div class="stat-row">
              <span>Contributions</span>
              <span class="val">35</span>
            </div>

            <p class="skill-label">Skills</p>
            <div class="d-flex flex-wrap gap-2 mb-4">
              <span class="tag">Figma</span>
              <span class="tag">UI/UX</span>
              <span class="tag">HTML/CSS</span>
              <span class="tag">Career Guidance</span>
            </div>

            <p class="skill-label">Badges</p>
            <div class="d-flex flex-wrap gap-2">
              <span class="tag">Design Ally</span>
              <span class="tag">Fast Responder</span>
              <span class="tag">Top Mentor</span>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-5">
          <div class="panel">
            <p class="eyebrow">Edit Profile</p>
            <h2>Update your identity</h2>

            <div class="name-loc-row">
              <div>
                <label>Name</label>
                <input type="text" value="Ayesha Khan" />
              </div>
              <div>
                <label>Location</label>
                <input type="text" value="Karachi" />
              </div>
            </div>

            <label>Skills</label>
            <input
              type="text"
              value="Figma, UI/UX, HTML/CSS, Career Guidance"
            />

            <label>Interests</label>
            <input type="text" value="Hackathons, UI/UX, Community Building" />

            <button class="btn-save">Save profile</button>
          </div>
        </div>
      </div>

      <div style="height: 48px"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
